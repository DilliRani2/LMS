<script>

let formData = {
  userRole: '',
  email: '',
  password: ''
};

let errors = {};

// Demo users (frontend only)
const demoUsers = [
  { email: "student@msajce.com", password: "123456", role: "student" },
  { email: "tpo@msajce.com", password: "123456", role: "tpo" },
  { email: "dept@msajce.com", password: "123456", role: "department" },
  { email: "faculty@msajce.com", password: "123456", role: "faculty" },
  { email: "hr@company.com", password: "123456", role: "recruiter" },
  { email: "admin@msajce.com", password: "admin123", role: "admin" }
];

document.addEventListener('DOMContentLoaded', function () {
  setupEventListeners();
  updateSignupLink();
});

function setupEventListeners() {
  const form = document.getElementById('loginForm');
  const roleSelect = document.getElementById('userRole');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');

  roleSelect.addEventListener('change', handleRoleChange);
  emailInput.addEventListener('input', handleChange);
  passwordInput.addEventListener('input', handleChange);
  form.addEventListener('submit', handleSubmit);
}

function handleRoleChange(e) {
  formData.userRole = e.target.value;
  updateSignupLink();
  clearErrors();
}

function updateSignupLink() {
  const signupLink = document.getElementById('signupLink');
  const selectedRole = formData.userRole;

  const signupPages = {
    student: 'Stu-Profile/stu-signup.html',
    tpo: 'Placement officer/place-signup.html',
    department: 'Department coordinator/Deprt-sigup.html',
    faculty: 'faculty-signup.html',
    recruiter: 'recruiter-signup.html',
    admin: 'Admin/Admin-signup.html'
  };

  signupLink.href = signupPages[selectedRole] || '#';
}

function handleChange(e) {
  const { name, value } = e.target;
  formData[name] = value;

  if (errors[name]) {
    clearFieldError(name);
  }
}

function validate() {
  const newErrors = {};

  if (!formData.userRole) {
    newErrors.userRole = 'Please select your role';
  }

  if (!formData.email) {
    newErrors.email = 'Email is required';
  }

  if (!formData.password) {
    newErrors.password = 'Password is required';
  }

  return newErrors;
}

function handleSubmit(e) {
  e.preventDefault();
  clearLoginError();

  const newErrors = validate();

  if (Object.keys(newErrors).length > 0) {
    errors = newErrors;
    displayErrors();
    return;
  }

  // Check demo users
  const user = demoUsers.find(
    u =>
      u.email === formData.email &&
      u.password === formData.password &&
      u.role === formData.userRole
  );

  if (user) {
    localStorage.setItem("currentUser", JSON.stringify(user));

    const roleRedirects = {
      student: 'Stu-Profile/Stu-Dashboard.html',
      tpo: 'Analytics.html',
      department: 'Department-Coordinator-Dashboard.html',
      faculty: 'Faculty-Mentor-Dashboard.html',
      recruiter: 'Recruiter-Dashboard.html',
      admin: 'Admin-Dashboard.html'
    };

    window.location.href = roleRedirects[user.role] || 'home.html';

  } else {
    showLoginError("Invalid email, password, or role");
  }
}

function displayErrors() {
  if (errors.email) showFieldError('email', errors.email);
  if (errors.password) showFieldError('password', errors.password);
}

function showFieldError(fieldName, message) {
  const errorElement = document.getElementById(fieldName + 'Error');
  const inputElement = document.getElementById(fieldName);

  errorElement.textContent = message;
  errorElement.style.display = 'block';
  inputElement.classList.add('error');
}

function clearFieldError(fieldName) {
  const errorElement = document.getElementById(fieldName + 'Error');
  const inputElement = document.getElementById(fieldName);

  errorElement.style.display = 'none';
  inputElement.classList.remove('error');
}

function clearErrors() {
  document.getElementById('emailError').style.display = 'none';
  document.getElementById('passwordError').style.display = 'none';
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');
  errors = {};
}

function showLoginError(message) {
  const container = document.getElementById('loginErrorContainer');
  container.innerHTML = `<div class="login-error-message">${message}</div>`;
}

function clearLoginError() {
  document.getElementById('loginErrorContainer').innerHTML = '';
}

</script>
