```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Signup - MSAJCE Training & Placement Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#f5f5f5;
}

/* Page Layout */
.signup-page-container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:2rem;
}

.signup-main-container{
display:grid;
grid-template-columns:1fr 1fr;
max-width:1200px;
width:100%;
background:white;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
overflow:hidden;
}

/* Left Branding */
.signup-left-column{
background:linear-gradient(135deg,#0E21A0,#4D2FB2);
display:flex;
align-items:center;
justify-content:center;
padding:3rem;
color:white;
}

.branding-content{
text-align:center;
}

.brand-logo{
width:150px;
height:150px;
background:white;
border-radius:50%;
padding:15px;
margin:auto;
margin-bottom:1.5rem;
}

.msajce-logo{
width:100%;
height:100%;
object-fit:contain;
}

.brand-name{
font-size:2.5rem;
font-weight:700;
}

.brand-role{
font-size:1.5rem;
margin-top:.3rem;
}

.brand-tagline{
margin-top:.3rem;
opacity:.8;
}

/* Right Form */
.signup-right-column{
display:flex;
align-items:center;
justify-content:center;
padding:3rem;
}

.signup-form-container{
width:100%;
max-width:400px;
}

.signup-form-title{
font-size:2rem;
color:#0E21A0;
margin-bottom:1rem;
}

.back-link{
color:#0E21A0;
text-decoration:none;
font-size:.9rem;
}

.signup-form{
display:flex;
flex-direction:column;
gap:1.2rem;
margin-top:1rem;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-label{
font-weight:600;
margin-bottom:4px;
}

.form-input{
padding:.8rem;
border:2px solid #ddd;
border-radius:6px;
background:#f8f9fa;
}

.form-input:focus{
outline:none;
border-color:#0E21A0;
background:white;
}

.error-message{
font-size:.8rem;
color:red;
display:none;
}

.signup-submit-btn{
padding:1rem;
background:linear-gradient(135deg,#0E21A0,#4D2FB2);
border:none;
color:white;
border-radius:8px;
font-weight:700;
cursor:pointer;
margin-top:5px;
}

.signup-submit-btn:hover{
background:linear-gradient(135deg,#4D2FB2,#B153D7);
}

.login-link{
text-align:center;
margin-top:10px;
}

.login-link-text{
text-decoration:none;
color:#0E21A0;
font-size:.9rem;
}

.signup-error-message{
background:#ffe6e6;
color:#c33;
padding:.7rem;
border-radius:6px;
font-size:.9rem;
margin-bottom:8px;
}

/* Responsive */
@media(max-width:900px){
.signup-main-container{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="signup-page-container">
<div class="signup-main-container">

<!-- Left Branding -->
<div class="signup-left-column">

<div class="branding-content">

<div class="brand-logo">
<img src="https://img.jagranjosh.com/images/2022/June/862022/MSAJCE2.png"
class="msajce-logo">
</div>

<h1 class="brand-name">MSAJCE</h1>
<p class="brand-role">Admin Portal</p>
<p class="brand-tagline">Training & Placement Portal</p>

</div>
</div>

<!-- Right Form -->
<div class="signup-right-column">

<div class="signup-form-container">

<a href="../home.html" class="back-link">← Back to Home</a>

<h2 class="signup-form-title">ADMIN SIGNUP</h2>

<form id="signupForm" class="signup-form">

<div class="form-group">
<label class="form-label">Username</label>
<input id="username" type="text" class="form-input" placeholder="Enter username">
<p id="usernameError" class="error-message"></p>
</div>

<div class="form-group">
<label class="form-label">College Email</label>
<input id="email" type="email" class="form-input" placeholder="Enter college email">
<p id="emailError" class="error-message"></p>
</div>

<div class="form-group">
<label class="form-label">Password</label>
<input id="password" type="password" class="form-input" placeholder="Enter password">
<p id="passwordError" class="error-message"></p>
</div>

<div class="form-group">
<label class="form-label">Confirm Password</label>
<input id="confirmPassword" type="password" class="form-input" placeholder="Confirm password">
<p id="confirmPasswordError" class="error-message"></p>
</div>

<div id="signupErrorContainer"></div>

<button type="submit" class="signup-submit-btn">SIGN UP</button>

</form>

<div class="login-link">
<a href="admin-login.html" class="login-link-text">
Already have an account? Login here
</a>
</div>

</div>
</div>

</div>
</div>

<script>

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault()

let username=document.getElementById("username").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value
let confirmPassword=document.getElementById("confirmPassword").value

let error=false

function showError(id,msg){
let el=document.getElementById(id)
el.innerText=msg
el.style.display="block"
error=true
}

if(username.length<2){
showError("usernameError","Username must be at least 2 characters")
}

if(!email.endsWith("@msajce.edu.in")){
showError("emailError","Use college email (@msajce.edu.in)")
}

if(password.length<6){
showError("passwordError","Password must be at least 6 characters")
}

if(password!==confirmPassword){
showError("confirmPasswordError","Passwords do not match")
}

if(error) return

let adminUser={
username:username,
email:email,
password:password,
role:"admin"
}

localStorage.setItem("adminUser",JSON.stringify(adminUser))
localStorage.setItem("currentUser",JSON.stringify(adminUser))

alert("Admin Signup Successful 🎉")

window.location.href="Admin-Dashboard.html"

})

</script>

</body>
</html>
```
